    <meta charset="utf-8" />
    <meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0'>

    {% if page.excerpt %}
    <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}" />
    <meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 200 }}" />
    {% else %}
    <meta name="description" content="{{ site.description }}">
    <meta property="og:description" content="{{ site.description }}" />
    {% endif %}
    <meta name="author" content="{{ site.name }}" />

    {% if page.title %}
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="twitter:title" content="{{ page.title }}" />
    {% else %}
    <meta property="og:title" content="{{ site.name }}" />
    {% endif %}

    {% if page.layout == 'post' %}
    <meta property="og:type" content="article" />
    {% else %}
    <meta property="og:type" content="website" />
    {% endif %}

    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}" />

    {% if page.image %}
    <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}{{ page.image }}" />
    <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}{{ page.image }}" />
    {% else %}
    <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}{{ site.avatar }}" />
    <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}{{ site.avatar }}" />
    {% endif %}

    <meta name="twitter:card" content="summary" />
    <meta property="og:site_name" content="{{ site.name }}" />
